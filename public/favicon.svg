<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Warm golden background gradient matching the image -->
    <linearGradient id="goldbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5C842"/>
      <stop offset="50%"  stop-color="#E8A820"/>
      <stop offset="100%" stop-color="#D4900A"/>
    </linearGradient>
  </defs>

  <!-- Golden rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#goldbg)"/>

  <!--
    Dark hexagon bolt/nut shape centered
    A regular hexagon centered at 32,32 with flat-top orientation (like a bolt head)
    radius ~18px, then inner hole
  -->

  <!-- Outer hexagon (flat-top, bolt-head shape) -->
  <!-- flat-top hex: points at angles 0,60,120,180,240,300 degrees, r=20 -->
  <!-- center 32,32  r=20
    0°:   32+20,  32     = 52, 32
    60°:  32+10,  32-17.3= 42, 14.7
    120°: 32-10,  32-17.3= 22, 14.7
    180°: 32-20,  32     = 12, 32
    240°: 32-10,  32+17.3= 22, 49.3
    300°: 32+10,  32+17.3= 42, 49.3
  -->
  <polygon
    points="52,32 42,14.7 22,14.7 12,32 22,49.3 42,49.3"
    fill="#1a1a1a"
  />

  <!-- Inner hexagon hole (lighter dark, to show depth like a real nut) -->
  <!-- r=10
    52→42: 32+10=42, 32
    60°: 32+5, 32-8.66=37,23.34
    120°: 32-5, 32-8.66=27,23.34
    180°: 32-10=22, 32
    240°: 32-5, 32+8.66=27,40.66
    300°: 32+5, 32+8.66=37,40.66
  -->
  <polygon
    points="42,32 37,23.34 27,23.34 22,32 27,40.66 37,40.66"
    fill="#111111"
  />

  <!-- Small shine on the golden background (top-left subtle highlight) -->
  <ellipse cx="20" cy="18" rx="14" ry="9" fill="white" opacity="0.12" transform="rotate(-20 20 18)"/>
</svg>
